name: routed-blueprint-example
version: 0.2
formatVersion: 1
inputs: {}
resources:
  Routed_Network:
    type: Cloud.NSX.Network
    properties:
      name: network
      networkType: routed
      constraints:
        - tag: 'network:routed'
  VM1:
    type: Cloud.vSphere.Machine
    properties:
      image: viktorious-ubuntu1604
      cpuCount: 1
      totalMemoryMB: 2048
      networks:
        - network: '${resource.Routed_Network.id}'
      storage:
        constraints:
          - tag: 'storage:ssd'
  VM2:
    type: Cloud.vSphere.Machine
    properties:
      image: viktorious-ubuntu1604
      cpuCount: 1
      totalMemoryMB: 2048
      networks:
        - network: '${resource.Routed_Network.id}'
      storage:
        constraints:
          - tag: 'storage:ssd'
