formatVersion: 1
inputs: {}
resources:
  Cloud_NSX_Network_1:
    type: Cloud.NSX.Network
    properties:
      name: network
      networkType: outbound
      constraints:
        - tag: 'network:nat'
  VM1:
    type: Cloud.vSphere.Machine
    properties:
      image: viktorious-centos76
      cpuCount: 1
      totalMemoryMB: 2048
      networks:
        - network: '${resource.Cloud_NSX_Network_1.id}'
      storage:
        constraints:
          - tag: 'storage:ssd'
  VM2:
    type: Cloud.vSphere.Machine
    properties:
      image: viktorious-centos76
      cpuCount: 1
      totalMemoryMB: 2048
      networks:
        - network: '${resource.Cloud_NSX_Network_1.id}'
      storage:
        constraints:
          - tag: 'storage:ssd'
